<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BBDown 下载器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; padding-bottom: 40px; }

/* ---- header ---- */
.header { background: #1a1a1a; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #252525; display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; }
.header h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.header-btns { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.header-btns button { padding: 5px 9px; font-size: 12px; background: #333; color: #ccc; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.header-btns button:active { background: #444; }

/* ---- form ---- */
.form-area { padding: 14px 14px 8px; }
.form-area input[type="text"] { width: 100%; padding: 12px 14px; font-size: 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #eee; margin-bottom: 12px; outline: none; -webkit-appearance: none; transition: border-color 0.2s; }
.form-area input[type="text"]:focus { border-color: #00a1d6; }
.form-area input[type="text"]::placeholder { color: #555; }

/* ---- segmented mode toggle ---- */
.segmented { display: flex; background: #1a1a1a; border-radius: 10px; padding: 3px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
.segmented label { flex: 1; text-align: center; padding: 10px 8px; font-size: 14px; font-weight: 600; color: #777; border-radius: 8px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; }
.segmented label.active { background: #00a1d6; color: #fff; }
.segmented input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }

/* ---- buttons ---- */
.btn-row { display: flex; gap: 10px; }
.btn-row button { flex: 1; padding: 12px; font-size: 15px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; -webkit-appearance: none; transition: transform 0.1s, opacity 0.2s; }
.btn-row button:active { transform: scale(0.97); }
.btn-download { background: #00a1d6; color: #fff; box-shadow: 0 2px 8px rgba(0,161,214,0.25); }
.btn-bili { color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.btn-bili.logged-out { background: #fb7299; }
.btn-bili.logged-in { background: #555; }

/* ---- B站 status bar ---- */
.bili-bar { display: flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 12px; }
.bili-bar.on { color: #4caf50; }
.bili-bar.off { color: #ff9800; }
.bili-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.bili-bar.on .bili-dot { background: #4caf50; }
.bili-bar.off .bili-dot { background: #ff9800; }

/* ---- section ---- */
.section-title { padding: 8px 14px; font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.empty-state { text-align: center; padding: 36px 20px; color: #444; font-size: 14px; }
.empty-state .icon { font-size: 36px; margin-bottom: 8px; }

/* ---- task card ---- */
.task-card { margin: 0 18px 10px; padding: 16px; background: #1a1a1a; border-radius: 12px; border: 1px solid #252525; }
.task-title { font-size: 14px; margin-bottom: 8px; word-break: break-all; color: #ddd; }
.task-meta { font-size: 12px; color: #777; display: flex; gap: 10px; align-items: center; }
.task-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.task-badge.video { background: #1a3a4a; color: #4fc3f7; }
.task-badge.audio { background: #1a3a2a; color: #81c784; }
.progress-bar { height: 3px; background: #2a2a2a; border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: #00a1d6; border-radius: 2px; transition: width 0.3s; }
.task-completed .progress-fill { background: #4caf50; }
.task-failed .progress-fill { background: #f44336; }
.btn-save { display: inline-block; margin-top: 10px; padding: 8px 18px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
.btn-save:active { opacity: 0.8; }
.task-error { color: #f44336; font-size: 13px; margin-top: 6px; }
.task-status { font-size: 12px; margin-top: 4px; }
.task-status.pending { color: #888; }
.task-status.downloading { color: #00a1d6; }

/* ---- toast ---- */
.warning-toast { position: fixed; top: 12px; left: 18px; right: 18px; padding: 12px 16px; background: #ff9800; color: #000; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 40; display: none; animation: slideDown 0.3s ease; box-shadow: 0 4px 16px rgba(255,152,0,0.3); }
@keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ---- modal ---- */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 50; justify-content: center; align-items: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { width: 100%; max-width: 340px; background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
.modal h2 { font-size: 17px; margin-bottom: 14px; }
.modal p { font-size: 14px; color: #aaa; margin-bottom: 18px; line-height: 1.5; }
.modal input { width: 100%; padding: 10px 12px; font-size: 15px; background: #252525; border: 1px solid #333; border-radius: 8px; color: #eee; margin-bottom: 10px; outline: none; -webkit-appearance: none; }
.modal input:focus { border-color: #00a1d6; }
.modal button { padding: 10px 20px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; -webkit-appearance: none; font-weight: 600; transition: opacity 0.2s; }
.modal button:active { opacity: 0.8; }
.modal .btn-primary { background: #00a1d6; color: #fff; }
.modal .btn-danger { background: #f44336; color: #fff; }
.modal .btn-close { background: #444; color: #ccc; }
.modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.modal .btn-row button { flex: none; }
.modal .user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
.modal .user-row span { font-size: 14px; }
.modal .user-actions { display: flex; gap: 6px; }
.modal .user-actions button { padding: 5px 12px; font-size: 13px; }
.qrcode-area { text-align: center; padding: 8px 0; }
.qrcode-area img { max-width: 100%; border-radius: 8px; }
.qrcode-area pre { background: #fff; color: #000; display: inline-block; padding: 8px; font-size: 10px; line-height: 1.0; border-radius: 8px; overflow-x: auto; max-width: 100%; white-space: pre; }
.qrcode-area .hint { color: #777; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<!-- header -->
<div class="header">
  <h1>🎵 BBDown</h1>
  <div class="header-btns">
    {% if is_admin %}<button onclick="openUserModal()">管理</button>{% endif %}
    <button onclick="logout()">登出</button>
  </div>
</div>

<!-- form -->
<div class="form-area">
  <input type="text" id="urlInput" placeholder="粘贴B站链接（BV号或完整URL）..." autofocus>
  <div class="segmented" id="modeSeg">
    <label data-value="video" class="active"><input type="radio" name="mode" value="video" checked> 🎬 视频+音频</label>
    <label data-value="audio"><input type="radio" name="mode" value="audio"> 🎵 仅音频</label>
  </div>
  <div class="btn-row">
    <button class="btn-download" onclick="submitDownload()">⬇ 开始下载</button>
    <button class="btn-bili logged-out" id="btnBili" onclick="toggleBiliLogin()">登录B站</button>
  </div>
</div>

<!-- B站 status -->
<div class="bili-bar off" id="biliBar"><span class="bili-dot"></span> <span id="biliBarText">未登录B站 — 高清/大会员视频可能无法下载</span></div>

<!-- toast -->
<div id="warningToast" class="warning-toast"></div>

<!-- task list -->
<div class="section-title">下载列表</div>
<div id="taskList"><div class="empty-state"><div class="icon">📭</div>暂无下载任务<br>粘贴B站链接开始下载</div></div>

<!-- user management modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <h2>👥 用户管理</h2>
    <div id="userList"></div>
    <div style="margin-top:16px">
      <input type="text" id="newUsername" placeholder="新用户名">
      <input type="password" id="newPassword" placeholder="密码">
      <button class="btn-primary" onclick="addUser()" style="width:100%">添加用户</button>
    </div>
    <div style="margin-top:14px;text-align:right">
      <button class="btn-close" onclick="closeUserModal()">关闭</button>
    </div>
    <div id="userError" style="color:#f44336;font-size:13px;margin-top:8px"></div>
  </div>
</div>

<!-- QR login modal -->
<div class="modal-overlay" id="qrModal">
  <div class="modal">
    <h2>📱 登录B站</h2>
    <div class="qrcode-area" id="qrArea">
      <p style="color:#888">正在生成二维码...</p>
    </div>
    <div style="text-align:right;margin-top:12px">
      <button class="btn-close" onclick="closeQrModal()">取消</button>
    </div>
  </div>
</div>

<!-- confirm modal (reusable) -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h2 id="confirmTitle">确认操作</h2>
    <p id="confirmMsg"></p>
    <div class="btn-row">
      <button class="btn-close" onclick="closeConfirmModal()">取消</button>
      <button class="btn-danger" id="confirmBtn" onclick="">确认</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_ROOT = "{{ request.script_root }}";
const evtSource = new EventSource(SCRIPT_ROOT + '/api/events');
const tasks = {};
let bilibiliLoggedIn = false;

// ===== segmented mode toggle =====
(function() {
  const seg = document.getElementById('modeSeg');
  const labels = seg.querySelectorAll('label');
  labels.forEach(l => {
    l.addEventListener('click', () => {
      labels.forEach(x => x.classList.remove('active'));
      l.classList.add('active');
      l.querySelector('input').checked = true;
    });
  });
})();

// ===== B站登录状态 =====
evtSource.addEventListener('status:bilibili_update', (e) => {
  const d = JSON.parse(e.data);
  bilibiliLoggedIn = d.logged_in;
  updateBiliUI();
});

async function loadBiliStatus() {
  try {
    const resp = await fetch(SCRIPT_ROOT + '/api/status');
    const data = await resp.json();
    bilibiliLoggedIn = data.bilibili_logged_in;
    updateBiliUI();
  } catch(e) {}
}
loadBiliStatus();

function updateBiliUI() {
  const btn = document.getElementById('btnBili');
  const bar = document.getElementById('biliBar');
  const barText = document.getElementById('biliBarText');
  if (bilibiliLoggedIn) {
    btn.textContent = '退出B站';
    btn.className = 'btn-bili logged-in';
    bar.className = 'bili-bar on';
    barText.textContent = 'B站已登录 — 可下载高清视频';
  } else {
    btn.textContent = '登录B站';
    btn.className = 'btn-bili logged-out';
    bar.className = 'bili-bar off';
    barText.textContent = '未登录B站 — 高清/大会员视频可能无法下载';
  }
}

function toggleBiliLogin() {
  if (bilibiliLoggedIn) {
    showConfirm('退出B站登录', '退出后下载高清晰度/大会员视频可能受限，确认退出？', async () => {
      await fetch(SCRIPT_ROOT + '/api/bilibili-logout', {method: 'POST'});
      bilibiliLoggedIn = false;
      updateBiliUI();
    });
  } else {
    biliLogin();
  }
}

// ===== confirm modal =====
let _confirmCallback = null;

function showConfirm(title, msg, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  _confirmCallback = callback;
  document.getElementById('confirmModal').classList.add('active');
}
document.getElementById('confirmBtn').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('active');
  if (_confirmCallback) { _confirmCallback(); _confirmCallback = null; }
});
function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('active');
  _confirmCallback = null;
}

// ===== SSE events =====
evtSource.addEventListener('download:progress', (e) => {
  const d = JSON.parse(e.data);
  tasks[d.task_id] = Object.assign(tasks[d.task_id] || {}, d, {status: 'downloading'});
  renderTasks();
});
evtSource.addEventListener('download:complete', (e) => {
  const d = JSON.parse(e.data);
  tasks[d.task_id] = Object.assign(tasks[d.task_id] || {}, d, {status: 'completed', progress: 1.0});
  renderTasks();
});
evtSource.addEventListener('download:fail', (e) => {
  const d = JSON.parse(e.data);
  tasks[d.task_id] = Object.assign(tasks[d.task_id] || {}, d, {status: 'failed'});
  renderTasks();
});
evtSource.addEventListener('login:qrcode', (e) => {
  const d = JSON.parse(e.data);
  let html = '';
  if (d.image) {
    html = '<img src="' + d.image + '" alt="QR">' +
           '<p class="hint">截屏后用B站App → 扫一扫 → 相册 → 扫码</p>';
  } else {
    html = '<pre>' + d.qrcode + '</pre><p class="hint">截屏后用B站App → 扫一扫 → 相册 → 扫码</p>';
  }
  document.getElementById('qrArea').innerHTML = html;
});
evtSource.addEventListener('login:success', () => {
  bilibiliLoggedIn = true;
  updateBiliUI();
  document.getElementById('qrArea').innerHTML = '<p style="color:#4caf50;font-size:16px">✅ 登录成功！</p>';
  setTimeout(closeQrModal, 1500);
});
evtSource.addEventListener('login:fail', (e) => {
  const d = JSON.parse(e.data);
  document.getElementById('qrArea').innerHTML = '<p style="color:#f44336">❌ 登录失败: ' + d.error + '</p>';
});

// ===== tasks =====
async function loadTasks() {
  const resp = await fetch(SCRIPT_ROOT + '/api/tasks');
  const data = await resp.json();
  data.forEach(t => { tasks[t.id] = t; });
  renderTasks();
}
loadTasks();

async function submitDownload() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const resp = await fetch(SCRIPT_ROOT + '/api/download', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url, mode})
  });
  const data = await resp.json();
  if (data.warning) {
    const toast = document.getElementById('warningToast');
    toast.textContent = '⚠ ' + data.warning;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 5000);
  }
  if (data.task_id) {
    tasks[data.task_id] = {id: data.task_id, url, mode, status: 'pending', title: url, progress: 0};
    document.getElementById('urlInput').value = '';
    renderTasks();
  }
}

async function biliLogin() {
  document.getElementById('qrModal').classList.add('active');
  document.getElementById('qrArea').innerHTML = '<p style="color:#888">正在生成二维码...</p>';
  await fetch(SCRIPT_ROOT + '/api/login-bilibili', {method: 'POST'});
}
function closeQrModal() {
  document.getElementById('qrModal').classList.remove('active');
}

function renderTasks() {
  const container = document.getElementById('taskList');
  const list = Object.values(tasks).sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无下载任务<br>粘贴B站链接开始下载</div>';
    return;
  }
  container.innerHTML = list.map(t => {
    const pct = Math.round((t.progress || 0) * 100);
    const modeBadge = t.mode === 'audio' ? '<span class="task-badge audio">🎵 音频</span>' : '<span class="task-badge video">🎬 视频</span>';
    let body = '';
    let cssClass = '';
    if (t.status === 'downloading') {
      body = '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
             '<div class="task-status downloading">' + pct + '% · ' + (t.speed || '') + '</div>';
    } else if (t.status === 'completed') {
      body = '<a class="btn-save" href="' + SCRIPT_ROOT + '/api/file/' + t.id + '">💾 保存文件</a>';
      cssClass = ' task-completed';
    } else if (t.status === 'failed') {
      body = '<div class="task-error">❌ ' + (t.error || '下载失败') + '</div>';
      cssClass = ' task-failed';
    } else {
      body = '<div class="task-status pending">⏳ 等待中...</div>';
    }
    return '<div class="task-card' + cssClass + '">' +
           '<div class="task-title">' + (t.title || t.url || '(无标题)') + '</div>' +
           '<div class="task-meta">' + modeBadge + '</div>' + body + '</div>';
  }).join('');
}

// ===== user management =====
async function openUserModal() {
  document.getElementById('userModal').classList.add('active');
  await loadUserList();
}
function closeUserModal() { document.getElementById('userModal').classList.remove('active'); }

async function loadUserList() {
  const resp = await fetch(SCRIPT_ROOT + '/api/users');
  const users = await resp.json();
  document.getElementById('userList').innerHTML = users.map(u =>
    '<div class="user-row"><span>' + u + '</span>' +
    '<div class="user-actions">' +
    '<button class="btn-primary" onclick="changePwdPrompt(\'' + u + '\')">改密</button>' +
    '<button class="btn-danger" onclick="removeUser(\'' + u + '\')">删除</button>' +
    '</div></div>'
  ).join('');
}
async function addUser() {
  const u = document.getElementById('newUsername').value.trim();
  const p = document.getElementById('newPassword').value;
  if (!u || !p) return;
  const resp = await fetch(SCRIPT_ROOT + '/api/users/add', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: u, password: p})
  });
  const data = await resp.json();
  if (data.ok) {
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    loadUserList();
  } else {
    document.getElementById('userError').textContent = data.error;
  }
}
async function removeUser(username) {
  showConfirm('删除用户', '确认删除用户「' + username + '」？此操作不可撤销。', async () => {
    const resp = await fetch(SCRIPT_ROOT + '/api/users/remove', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username})
    });
    const data = await resp.json();
    if (data.ok) loadUserList();
    else alert(data.error);
  });
}
async function changePwdPrompt(username) {
  const newPw = prompt('输入「' + username + '」的新密码（管理员可强制重置）');
  if (!newPw) return;
  const resp = await fetch(SCRIPT_ROOT + '/api/users/change-password', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, old_password: '', new_password: newPw})
  });
  const data = await resp.json();
  alert(data.ok ? '密码已更新' : data.error);
}
async function logout() {
  await fetch(SCRIPT_ROOT + '/api/logout', {method: 'POST'});
  window.location.href = SCRIPT_ROOT + '/login';
}
</script>
</body>
</html>
